<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!--
    Grain tile — SVG filter noise at a fixed frequency.
    Used via `background-image: url(...)` on `.grain`.
    Kept at 240×240 (small enough to stay under ~4kb once
    served from /public) and tiled by CSS. 0.85 baseFrequency
    lands near "paper fibre" — dense but still organic.
  -->
  <filter id="n" x="0" y="0">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" seed="7"/>
    <feColorMatrix type="matrix" values="
      0 0 0 0 0.17
      0 0 0 0 0.17
      0 0 0 0 0.17
      0 0 0 0.6 0"/>
  </filter>
  <rect width="240" height="240" filter="url(#n)"/>
</svg>
