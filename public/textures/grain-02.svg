<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <!--
    Softer grain used on dark slabs so texture doesn't clip blacks.
    Lower baseFrequency = larger, more painterly grains.
  -->
  <filter id="n">
    <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="3" stitchTiles="stitch" seed="19"/>
    <feColorMatrix type="matrix" values="
      0 0 0 0 0.92
      0 0 0 0 0.92
      0 0 0 0 0.9
      0 0 0 0.45 0"/>
  </filter>
  <rect width="320" height="320" filter="url(#n)"/>
</svg>
